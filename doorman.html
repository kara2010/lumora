<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
  :root { --accent: #4F8EF7; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif; -webkit-user-select: none; cursor: default; }
  #card {
    margin: 8px; padding: 14px 16px 15px; border-radius: 15px;
    background: linear-gradient(160deg, rgba(24,27,35,0.97) 0%, rgba(16,18,24,0.97) 100%);
    border: 1px solid rgba(79,142,247,0.55);
    box-shadow: 0 10px 34px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,142,247,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
    color: #eaeef4;
  }
  #head { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #9fb4d6; letter-spacing: .2px; }
  #head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 9px var(--accent); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.82); } }
  #who { margin: 9px 0 13px; font-size: 15.5px; line-height: 1.35; }
  #avatar { display: inline-flex; width: 24px; height: 24px; border-radius: 50%; vertical-align: -6px; margin-right: 7px;
    align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, var(--accent), #6f57e0); }
  #name { font-weight: 700; color: #fff; }
  #btns { display: flex; gap: 10px; }
  button { flex: 1; padding: 9px 0; border-radius: 10px; border: 0; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: filter .12s, transform .06s; }
  button:hover { filter: brightness(1.12); } button:active { transform: translateY(1px); }
  #ok { background: var(--accent); color: #fff; box-shadow: 0 3px 12px rgba(79,142,247,0.35); }
  #no { background: rgba(255,255,255,0.08); color: #cbd3df; }
  #more { margin-top: 9px; font-size: 11px; color: #7f8a99; text-align: center; min-height: 13px; }
  #idle { text-align: center; color: #7f8a99; font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>
<div id="card">
  <div id="wait" style="display:none">
    <div id="head"><span class="dot"></span> <span id="title">Zuschauer möchte beitreten</span></div>
    <div id="who"><span id="avatar">?</span><span id="name"></span> <span id="wants">möchte zuschauen</span></div>
    <div id="btns"><button id="no">Ablehnen</button><button id="ok">Zulassen</button></div>
    <div id="more"></div>
  </div>
  <div id="idle">Keine Anfragen</div>
</div>
<script>
  const { ipcRenderer } = require('electron')
  let queue = [], de = true
  const $ = (id) => document.getElementById(id)
  function applyLang() {
    $('title').textContent = de ? 'Zuschauer möchte beitreten' : 'A viewer wants to join'
    $('wants').textContent = de ? 'möchte zuschauen' : 'wants to watch'
    $('ok').textContent = de ? 'Zulassen' : 'Allow'
    $('no').textContent = de ? 'Ablehnen' : 'Deny'
    $('idle').textContent = de ? 'Keine Anfragen' : 'No requests'
  }
  function render() {
    if (!queue.length) { $('wait').style.display = 'none'; $('idle').style.display = 'block'; return }
    $('idle').style.display = 'none'; $('wait').style.display = 'block'
    const cur = queue[0], nm = cur.name || 'Gast'
    $('name').textContent = nm
    $('avatar').textContent = (nm.trim()[0] || '?').toUpperCase()
    $('more').textContent = queue.length > 1
      ? (de ? ('+' + (queue.length - 1) + ' weitere warten') : ('+' + (queue.length - 1) + ' more waiting'))
      : ''
  }
  function decide(ok) { const cur = queue[0]; if (cur) ipcRenderer.invoke('doorman-decide', cur.vid, ok) }
  $('ok').onclick = () => decide(true)
  $('no').onclick = () => decide(false)
  ipcRenderer.on('doorman-list', (e, list, isDe) => { queue = Array.isArray(list) ? list : []; de = !!isDe; applyLang(); render() })
  applyLang(); render()
</script>
</body>
</html>
