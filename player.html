<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lumora Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0b0d12; color: #e8e8ea; font-family: system-ui, -apple-system, Segoe UI, sans-serif; overflow: hidden; }
  /* 100dvh: auf Handys die WIRKLICHE sichtbare Hoehe (dynamische Adressleiste). */
  body { height: 100dvh; }
  #v { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
  #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 18px; transition: opacity .4s; padding: 20px; }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .badge { display: flex; align-items: center; gap: 11px; background: rgba(10,12,18,.72); padding: 14px 22px; border-radius: 12px; font-size: 15px; backdrop-filter: blur(6px); max-width: min(92vw, 460px); text-align: left; line-height: 1.35; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #f5b942; animation: pulse 1.2s infinite; flex-shrink: 0; }
  .dot.live { background: #4ade80; animation: none; }
  .dot.err { background: #f05a5a; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
  /* Live-Statistik oben rechts – respektiert Notch/Safe-Area, bricht bei Platzmangel um */
  #stats { position: fixed; top: max(12px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right));
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end;
    max-width: calc(100vw - 28px);
    background: rgba(10,12,18,.6); padding: 7px 13px; border-radius: 9px; font-size: 13px;
    font-variant-numeric: tabular-nums; backdrop-filter: blur(6px); transition: opacity .3s; }
  #stats .val { color: #fff; font-weight: 600 }
  #stats .unit { color: #8a8a96; margin-left: 2px }
  #stats .fps { color: #74e857 }
  /* Untere Steuerleiste – blendet nach Inaktivitaet aus, respektiert Safe-Area */
  #bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap;
    padding: 14px max(16px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    background: linear-gradient(transparent, rgba(0,0,0,.55)); transition: opacity .3s; }
  /* Steuerleiste UND Info-Anzeige blenden bei Inaktivitaet aus – AUSSER die
     Info-Anzeige ist per 📊 angeheftet (stats-pinned), dann bleibt sie dauerhaft. */
  .idle #bar, .idle #stats { opacity: 0; pointer-events: none; }
  body.stats-pinned.idle #stats { opacity: 1; pointer-events: auto; }
  .idle { cursor: none; }
  button.ctl { display: flex; align-items: center; gap: 7px; background: rgba(20,22,30,.8); color: #e8e8ea;
    border: 1px solid rgba(255,255,255,.12); border-radius: 9px; padding: 10px 15px; font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
  button.ctl:hover { background: rgba(40,44,58,.9) }
  button.ctl:active { background: rgba(52,56,72,.95) }
  button.ctl svg { width: 17px; height: 17px; fill: currentColor }
  /* Lautstaerke in der Leiste: Lautsprecher-Icon (Mute-Toggle) + Schieberegler.
     Solange stumm, ist der Slider ausgeblendet (nutzlos) – die Aufforderung zum
     Ton uebernimmt der grosse #soundHint mitten im Bild (unuebersehbar). */
  #volCtl { align-items: center; gap: 10px; padding: 8px 14px; }
  #volCtl button { background: none; border: none; color: inherit; cursor: pointer; font-size: 16px; padding: 0; line-height: 1; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
  #volCtl.muted #volSlider { display: none; }               /* stumm: kein Slider */
  #volSlider { width: 92px; height: 4px; accent-color: #fff; cursor: pointer; }
  @media (max-width: 640px), (pointer: coarse) { #volSlider { width: 116px; height: 6px; } #volCtl button { font-size: 19px; } }
  /* Grosse Ton-Aufforderung: erscheint, sobald der Stream laeuft aber (Autoplay)
     stumm ist. Mittig ueber dem Video, pulsierend, ein Tipp aktiviert den Ton. */
  #soundHint { position: fixed; left: 50%; bottom: 23%; transform: translateX(-50%);
    display: none; align-items: center; gap: 12px; cursor: pointer; z-index: 6; white-space: nowrap;
    background: rgba(18,20,28,.9); color: #fff; border: 1px solid rgba(255,255,255,.26);
    border-radius: 999px; padding: 15px 26px; font-size: 17px; font-weight: 600;
    backdrop-filter: blur(8px); box-shadow: 0 10px 34px rgba(0,0,0,.55);
    animation: soundPulse 1.9s ease-in-out infinite; -webkit-tap-highlight-color: transparent; }
  #soundHint.show { display: flex; }
  #soundHint .ico { font-size: 22px; }
  @keyframes soundPulse {
    0%,100% { transform: translateX(-50%) scale(1);    box-shadow: 0 10px 34px rgba(0,0,0,.55); border-color: rgba(255,255,255,.26); }
    50%     { transform: translateX(-50%) scale(1.045); box-shadow: 0 10px 40px rgba(74,222,128,.4); border-color: rgba(74,222,128,.6); }
  }
  @media (max-width: 640px), (pointer: coarse) { #soundHint { font-size: 18px; padding: 16px 28px; } }
  /* Schmale Bildschirme (Handy hochkant): Vollbild-Text weg -> nur Icon, damit die
     Leiste in EINE Reihe passt und nichts abgeschnitten wird oder umbricht. */
  @media (max-width: 560px) { #fsLabel { display: none; } }
  #v { will-change: transform; }
  /* Touch-Geraete / kleine Bildschirme: groessere Tap-Ziele + lesbarere Groessen */
  @media (max-width: 640px), (pointer: coarse) {
    button.ctl { padding: 12px 18px; font-size: 15px; min-height: 46px; border-radius: 11px; }
    button.ctl svg { width: 19px; height: 19px; }
    #stats { font-size: 12px; gap: 9px; padding: 6px 11px; }
    .badge { font-size: 14px; padding: 13px 18px; }
    #bar { gap: 8px; padding-top: 22px; }
  }
  /* Handy quer (sehr flach): Statuszeile kompakter halten */
  @media (max-height: 430px) {
    #stats { font-size: 11px; padding: 5px 9px; gap: 7px; }
  }
</style>
</head>
<body>
<video id="v" autoplay playsinline></video>
<div id="stats">
  <span><span class="val fps" id="sFps">–</span><span class="unit">fps</span></span>
  <span><span class="val" id="sRes">–</span></span>
  <span><span class="val" id="sBitrate">–</span><span class="unit">Mbit/s</span></span>
</div>
<div id="overlay"><div class="badge"><span class="dot" id="dot"></span><span id="msg">Verbinde…</span></div></div>
<div id="soundHint" onclick="enableSound()"><span class="ico">🔊</span><span>Tippen für Ton</span></div>
<div id="bar">
  <div class="ctl" id="volCtl">
    <button id="soundBtn" onclick="toggleMute()" title="Ton an/aus"><span id="volIcon">🔊</span></button>
    <input type="range" id="volSlider" min="0" max="100" value="100" oninput="onVolInput()" title="Lautstärke">
  </div>
  <button class="ctl" id="statsBtn" onclick="toggleStats()" title="Infoanzeige ein/aus">📊</button>
  <button class="ctl" id="fsBtn" onclick="toggleFullscreen()" title="Vollbild (F / Doppelklick)">
    <svg viewBox="0 0 24 24" id="fsIcon"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/></svg>
    <span id="fsLabel">Vollbild</span>
  </button>
</div>
<script>
  // Lumora-Stream-Player: WHEP-Client. Der Stream kommt aus der nativen
  // Pipeline (FFmpeg-Hardware-Encoder -> mediamtx). Der Player holt per WHEP
  // (ein POST mit dem SDP-Offer, Antwort = SDP-Answer) eine WebRTC-Verbindung
  // zu mediamtx (ueber den Lumora-Proxy auf demselben Port). Qualitaet/Helligkeit
  // bestimmt der Sender (FFmpeg) – ein Stream fuer alle Zuschauer.
  var v = document.getElementById('v'), overlay = document.getElementById('overlay')
  var dot = document.getElementById('dot'), msg = document.getElementById('msg')
  var sFps = document.getElementById('sFps'), sRes = document.getElementById('sRes'), sBitrate = document.getElementById('sBitrate')
  // STUN hilft dem Zuschauer, seine eigene Adresse zu finden; die Medien laufen
  // zu mediamtx' oeffentlichem ICE-Host. TURN ist fuer reines Empfangen unnoetig.
  var ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.cloudflare.com:3478' }]
  function status(text, cls) { msg.textContent = text; dot.className = 'dot' + (cls ? ' ' + cls : '') }
  var volSlider = document.getElementById('volSlider'), volCtl = document.getElementById('volCtl'), volIcon = document.getElementById('volIcon'), soundHint = document.getElementById('soundHint')
  var _connected = false
  function applyVol() {
    var vol = volSlider.value / 100
    v.volume = vol
    // Stumm (Autoplay-Sperre) -> Slider in der Leiste ausgeblendet, dafuer die
    // grosse Aufforderung #soundHint. Aktiv -> Icon spiegelt die Lautstaerke.
    volCtl.classList.toggle('muted', v.muted)
    volIcon.textContent = v.muted ? '🔊' : (vol === 0 ? '🔇' : (vol < 0.5 ? '🔉' : '🔊'))
    soundHint.classList.toggle('show', _connected && v.muted)
  }
  function enableSound() {   // Tipp auf die grosse Aufforderung mitten im Bild
    v.muted = false
    if (Number(volSlider.value) === 0) volSlider.value = 100
    v.play().catch(function () {})
    applyVol()
  }
  function onVolInput() {
    if (volSlider.value > 0 && v.muted) v.muted = false   // erste Interaktion hebt die Autoplay-Stummschaltung auf
    v.play().catch(function () {})
    applyVol()
  }
  function toggleMute() {
    v.muted = !v.muted
    if (!v.muted) { if (Number(volSlider.value) === 0) volSlider.value = 100; v.play().catch(function () {}) }
    applyVol()
  }

  // --- Jitter-Puffer --------------------------------------------------------
  // Der STREAMER stellt den Puffer in Lumora ein; der Player holt ihn per /cfg
  // (in ms) und setzt ihn auf den Video-Empfaenger. WebRTCs Buffer ist adaptiv –
  // wir geben nur das ZIEL vor: klein = wenig Verzoegerung, gross = fluessiger
  // bei zappelnder Leitung. Regelmaessig neu geholt, damit eine Regler-Aenderung
  // auch bereits verbundene Zuschauer live erreicht (ohne Neuladen).
  var _bufMs = 120
  function applyBuffer(receiver) {
    try { receiver.playoutDelayHint = _bufMs / 1000 } catch (err) {}
    try { receiver.jitterBufferTarget = _bufMs } catch (err) {}
  }
  function refreshBuffer() {
    fetch('/cfg', { cache: 'no-store' }).then(function (r) { return r.json() }).then(function (c) {
      if (!c || typeof c.buffer !== 'number' || c.buffer === _bufMs) return
      _bufMs = c.buffer
      if (window._pc) window._pc.getReceivers().forEach(function (rc) {
        if (rc.track && rc.track.kind === 'video') applyBuffer(rc)
      })
    }).catch(function () {})
  }
  refreshBuffer()                 // initialen Wert holen (vor dem ersten Track)
  setInterval(refreshBuffer, 4000)

  // --- Vollbild -------------------------------------------------------------
  function toggleFullscreen() {
    if (document.fullscreenElement) { document.exitFullscreen() }
    else { (document.documentElement.requestFullscreen ? document.documentElement.requestFullscreen() : v.webkitEnterFullscreen && v.webkitEnterFullscreen()) }
  }
  document.addEventListener('fullscreenchange', function () {
    document.getElementById('fsLabel').textContent = document.fullscreenElement ? 'Beenden' : 'Vollbild'
  })
  v.addEventListener('dblclick', function () { if (zScale > 1) resetZoom(); else toggleFullscreen() })
  document.addEventListener('keydown', function (e) {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen()
    else if (e.key === '0' || e.key === 'Escape') { if (zScale > 1) resetZoom() }
  })

  // --- Info-Anzeige (fps/Aufloesung/Bitrate) ANHEFTEN: normal blendet sie mit
  //     der Steuerleiste bei Inaktivitaet aus; per 📊 angeheftet bleibt sie
  //     dauerhaft sichtbar. Zustand in localStorage gemerkt.
  var statsBtn = document.getElementById('statsBtn')
  function applyStatsPref() {
    var pin = localStorage.getItem('lumoraStatsPin') === '1'
    document.body.classList.toggle('stats-pinned', pin)
    if (statsBtn) statsBtn.style.opacity = pin ? '1' : '.55'
  }
  function toggleStats() {
    localStorage.setItem('lumoraStatsPin', localStorage.getItem('lumoraStatsPin') === '1' ? '0' : '1')
    applyStatsPref()
  }
  applyStatsPref()

  // --- Video-Zoom: Mausrad / Pinch zoomen, Ziehen verschiebt (nur bei Zoom) ---
  // transform-origin 0 0 + translate/scale; der Punkt unter Cursor/Pinch bleibt fix.
  var zScale = 1, zTx = 0, zTy = 0
  function applyZoom() {
    v.style.transformOrigin = '0 0'
    v.style.transform = 'translate(' + zTx + 'px,' + zTy + 'px) scale(' + zScale + ')'
    v.style.cursor = zScale > 1 ? 'grab' : ''
  }
  function clampZoom() {
    var w = innerWidth, h = innerHeight
    zTx = Math.min(0, Math.max(w - w * zScale, zTx))
    zTy = Math.min(0, Math.max(h - h * zScale, zTy))
  }
  function resetZoom() { zScale = 1; zTx = 0; zTy = 0; applyZoom() }
  function zoomTo(ns, cx, cy) {
    ns = Math.min(6, Math.max(1, ns))
    if (ns === zScale) return
    zTx = cx - (cx - zTx) * (ns / zScale)
    zTy = cy - (cy - zTy) * (ns / zScale)
    zScale = ns
    if (zScale <= 1.001) { zScale = 1; zTx = 0; zTy = 0 }
    clampZoom(); applyZoom()
  }
  v.addEventListener('wheel', function (e) { e.preventDefault(); zoomTo(zScale * (e.deltaY < 0 ? 1.15 : 1 / 1.15), e.clientX, e.clientY) }, { passive: false })
  var drag = null
  v.addEventListener('mousedown', function (e) { if (zScale > 1) { drag = { x: e.clientX, y: e.clientY }; v.style.cursor = 'grabbing'; e.preventDefault() } })
  addEventListener('mousemove', function (e) { if (drag) { zTx += e.clientX - drag.x; zTy += e.clientY - drag.y; drag.x = e.clientX; drag.y = e.clientY; clampZoom(); applyZoom() } })
  addEventListener('mouseup', function () { if (drag) { drag = null; v.style.cursor = zScale > 1 ? 'grab' : '' } })
  var ts = null
  function pinchDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY) }
  v.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) { ts = { d0: pinchDist(e.touches), s0: zScale, tx0: zTx, ty0: zTy, mx: (e.touches[0].clientX + e.touches[1].clientX) / 2, my: (e.touches[0].clientY + e.touches[1].clientY) / 2 } }
    else if (e.touches.length === 1 && zScale > 1) { ts = { pan: true, x: e.touches[0].clientX, y: e.touches[0].clientY } }
    else { ts = null }
  }, { passive: false })
  v.addEventListener('touchmove', function (e) {
    if (!ts) return
    if (ts.pan && e.touches.length === 1) {
      e.preventDefault()
      zTx += e.touches[0].clientX - ts.x; zTy += e.touches[0].clientY - ts.y
      ts.x = e.touches[0].clientX; ts.y = e.touches[0].clientY
      clampZoom(); applyZoom()
    } else if (e.touches.length === 2 && ts.d0) {
      e.preventDefault()
      var ns = Math.min(6, Math.max(1, ts.s0 * pinchDist(e.touches) / ts.d0))
      var wx = (ts.mx - ts.tx0) / ts.s0, wy = (ts.my - ts.ty0) / ts.s0
      zScale = ns; zTx = ts.mx - wx * ns; zTy = ts.my - wy * ns
      if (zScale <= 1.001) { zScale = 1; zTx = 0; zTy = 0 }
      clampZoom(); applyZoom()
    }
  }, { passive: false })
  v.addEventListener('touchend', function (e) { if (e.touches.length === 0) ts = null })

  // --- Steuerleiste bei Inaktivitaet ausblenden -----------------------------
  var idleTimer
  function activity() {
    document.body.classList.remove('idle')
    clearTimeout(idleTimer)
    idleTimer = setTimeout(function () { document.body.classList.add('idle') }, 2600)
  }
  document.addEventListener('mousemove', activity)
  document.addEventListener('touchstart', activity)
  activity()

  // --- Live-Statistik (empfangene FPS/Aufloesung/Bitrate) -------------------
  var lastBytes = 0, lastTs = 0
  setInterval(async function () {
    if (!window._pc) return
    try {
      var s = await window._pc.getStats(), inb = null
      s.forEach(function (r) { if (r.type === 'inbound-rtp' && r.kind === 'video') inb = r })
      if (!inb) return
      sFps.textContent = inb.framesPerSecond != null ? Math.round(inb.framesPerSecond) : '–'
      sRes.textContent = (inb.frameWidth && inb.frameHeight) ? inb.frameWidth + '×' + inb.frameHeight : '–'
      var now = performance.now()
      if (lastTs && inb.bytesReceived != null) {
        var mbit = (inb.bytesReceived - lastBytes) * 8 / ((now - lastTs) / 1000) / 1e6
        sBitrate.textContent = mbit >= 0 ? mbit.toFixed(1) : '–'
      }
      lastBytes = inb.bytesReceived || 0; lastTs = now
    } catch (e) {}
  }, 1000)

  function iceComplete(pc) {
    return new Promise(function (r) {
      if (pc.iceGatheringState === 'complete') return r()
      var t = setTimeout(r, 3000)
      pc.addEventListener('icegatheringstatechange', function () {
        if (pc.iceGatheringState === 'complete') { clearTimeout(t); r() }
      })
    })
  }
  var retrying = false
  function retry() {
    if (retrying) return
    retrying = true
    try { window._pc && window._pc.close() } catch (e) {}
    leave()   // alte WHEP-Session am Server abmelden, bevor eine neue entsteht (kein Zombie-Zuschauer)
    setTimeout(function () { retrying = false; connect() }, 800)
  }
  async function connect() {
    status('Verbinde…')
    overlay.classList.remove('hidden')
    // ICE-Server frisch vom Streamer holen: enthaelt STUN und – falls eingetragen –
    // den TURN-Relay. forceRelay=true (Testschalter) zwingt die Verbindung NUR
    // ueber TURN, damit sich das Relay ueberhaupt pruefen laesst.
    var ice = ICE_SERVERS, relay = false
    try {
      var cfg = await fetch('/cfg', { cache: 'no-store' }).then(function (r) { return r.json() })
      if (cfg && Array.isArray(cfg.iceServers) && cfg.iceServers.length) ice = cfg.iceServers
      relay = !!(cfg && cfg.forceRelay)
    } catch (e) {}
    var pc = new RTCPeerConnection({ iceServers: ice, iceTransportPolicy: relay ? 'relay' : 'all', bundlePolicy: 'max-bundle' })
    window._pc = pc
    // Diagnose (F12-Konsole): kommt ein "relay"-Kandidat vom TURN-Server? Welcher
    // ICE-Fehler tritt auf? (701/401 = Zugangsdaten, Timeout = nicht erreichbar)
    var sawRelay = false
    pc.addEventListener('icecandidate', function (e) {
      if (e.candidate) { if (e.candidate.type === 'relay') sawRelay = true; console.log('[ICE] Kandidat:', e.candidate.type, '|', e.candidate.candidate) }
      else console.log('[ICE] Sammlung fertig – relay erhalten:', sawRelay)
    })
    pc.addEventListener('icecandidateerror', function (e) { console.warn('[ICE] Fehler', e.errorCode, e.errorText, '| url:', e.url) })
    pc.addEventListener('iceconnectionstatechange', function () { console.log('[ICE] Status:', pc.iceConnectionState) })
    if (relay) { setTimeout(function () { if (!sawRelay) status('Relay antwortet nicht – Server/Zugangsdaten prüfen (F12-Konsole)', 'err') }, 6000) }
    var stream = new MediaStream()
    pc.addTransceiver('video', { direction: 'recvonly' })
    pc.addTransceiver('audio', { direction: 'recvonly' })
    pc.ontrack = function (e) {
      stream.addTrack(e.track); v.srcObject = stream
      // Vom Streamer eingestellten Jitter-Puffer anwenden (siehe applyBuffer).
      applyBuffer(e.receiver)
    }
    pc.addEventListener('connectionstatechange', function () {
      if (pc.connectionState === 'connected') {
        status('Live', 'live')
        _connected = true; applyVol()   // ggf. die grosse Ton-Aufforderung zeigen
        setTimeout(function () { overlay.classList.add('hidden') }, 1200)
      } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
        status('Verbindung verloren – neuer Versuch…', 'err')
        _connected = false; applyVol()
        overlay.classList.remove('hidden')
        // Nur im Vordergrund sofort neu verbinden. Im Hintergrund (App gewechselt)
        // waere das zwecklos + akkufressend – den Reconnect macht resume() bei der
        // Rueckkehr. So laeuft der Stream auch nach 2-5 Min Pause zuverlaessig weiter.
        if (document.visibilityState === 'visible') setTimeout(retry, 2000)
      }
    })
    try {
      var offer = await pc.createOffer()
      await pc.setLocalDescription(offer)
      await iceComplete(pc)
      // WHEP: das komplette Offer als application/sdp posten -> Answer im Body.
      var resp = await fetch('/whep', { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: pc.localDescription.sdp })
      if (resp.status !== 201 && !resp.ok) { status('Kein Stream (noch nicht gestartet?)', 'err'); setTimeout(retry, 3000); return }
      // Session-URL fuer sauberes Abmelden (DELETE) merken.
      var loc = resp.headers.get('location'); if (loc) window._whepSession = loc
      var answer = await resp.text()
      await pc.setRemoteDescription({ type: 'answer', sdp: answer })
    } catch (e) {
      status('Server nicht erreichbar', 'err')
      setTimeout(retry, 3000)
    }
  }
  // Autoplay: erst mit Ton versuchen; blockt der Browser, stumm starten + grosse
  // Ton-Aufforderung. WICHTIG: das Stummschalten passiert ASYNCHRON im catch –
  // applyVol() muss dort NACH v.muted=true erneut laufen, sonst erscheint der
  // "Tippen fuer Ton"-Hinweis nie (genau der frueher fehlende Fall).
  v.addEventListener('loadedmetadata', function () {
    v.play().catch(function () {
      v.muted = true
      v.play().catch(function () {})
      applyVol()
    })
    applyVol()   // Icon (🔊/🔇) an den tatsaechlichen Zustand angleichen
  })
  // Sicherheitsnetz: JEDE Mute-/Lautstaerke-Aenderung (egal woher) aktualisiert
  // Hinweis + Icon – Zustand und Anzeige koennen nicht mehr auseinanderlaufen.
  v.addEventListener('volumechange', applyVol)
  // Sauberes Abmelden beim Schliessen: WHEP-Session per DELETE beenden (keepalive
  // laesst den Request noch waehrend des Schliessens raus) -> Zuschauerzahl stimmt.
  function leave() {
    if (window._whepSession) {
      try { fetch(window._whepSession, { method: 'DELETE', keepalive: true }) } catch (e) {}
      window._whepSession = null
    }
  }
  // WICHTIG (mobil): Ein App-Wechsel oder eine eingehende Benachrichtigung
  // (WhatsApp o.ae.) legt die Seite nur kurz in den Hintergrund – pagehide feuert
  // dann, OHNE dass der Zuschauer den Player wirklich verlaesst. Wir duerfen die
  // WHEP-Session hier NICHT abbauen, sonst ist der Stream nach dem Zurueckschalten
  // tot. Nur beim ECHTEN Verwerfen der Seite (persisted=false) abmelden; beim
  // Weg-Tabben (bfcache, persisted=true) bleibt die Verbindung bestehen.
  window.addEventListener('pagehide', function (e) { if (!e.persisted) leave() })
  window.addEventListener('beforeunload', leave)
  // Rueckkehr aus dem Hintergrund: mobile Browser pausieren das Video -> wieder
  // anwerfen; und falls die Verbindung (auch nach 2-5 Min) abgerissen ist, neu
  // verbinden. WICHTIG: Nach langem Hintergrund kappt der Browser die Verbindung
  // teils STILL – connectionState bleibt 'connected', aber es kommt kein Bild mehr.
  // Darum messen wir die tatsaechlich dekodierten Frames statt dem Status zu trauen.
  var _healthTimer = null
  function framesDecoded() {
    return new Promise(function (res) {
      if (!window._pc) return res(null)
      window._pc.getStats().then(function (s) {
        var n = null; s.forEach(function (r) { if (r.type === 'inbound-rtp' && r.kind === 'video') n = r.framesDecoded })
        res(n)
      }).catch(function () { res(null) })
    })
  }
  function resume() {
    v.play().catch(function () {})
    var st = window._pc && window._pc.connectionState
    if (!window._pc || st === 'failed' || st === 'disconnected' || st === 'closed') { retry(); return }
    // Status meldet "gesund" – trotzdem gegenpruefen, ob wirklich wieder Bild kommt.
    framesDecoded().then(function (before) {
      clearTimeout(_healthTimer)
      _healthTimer = setTimeout(function () {
        if (document.visibilityState !== 'visible') return
        framesDecoded().then(function (after) {
          if (before == null || after == null || after <= before) retry()   // kein neuer Frame in ~2s -> neu verbinden
        })
      }, 2000)
    })
  }
  document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'visible') resume() })
  window.addEventListener('pageshow', function (e) { if (e.persisted) resume() })   // Rueckkehr aus dem bfcache

  connect()
</script>
</body>
</html>
