<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lumora Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0b0d12; color: #e8e8ea; font-family: system-ui, -apple-system, Segoe UI, sans-serif; overflow: hidden; }
  /* 100dvh: auf Handys die WIRKLICHE sichtbare Hoehe (dynamische Adressleiste). */
  body { height: 100dvh; }
  #v { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
  #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 18px; transition: opacity .4s; padding: 20px; }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .badge { display: flex; align-items: center; gap: 11px; background: rgba(10,12,18,.72); padding: 14px 22px; border-radius: 12px; font-size: 15px; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); max-width: min(92vw, 460px); text-align: left; line-height: 1.35; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #f5b942; animation: pulse 1.2s infinite; flex-shrink: 0; }
  .dot.live { background: #4ade80; animation: none; }
  .dot.err { background: #f05a5a; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
  /* Live-Statistik oben rechts – respektiert Notch/Safe-Area, bricht bei Platzmangel um */
  #stats { position: fixed; top: max(12px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right));
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end;
    max-width: calc(100vw - 28px);
    background: rgba(10,12,18,.6); padding: 7px 13px; border-radius: 9px; font-size: 13px;
    font-variant-numeric: tabular-nums; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); transition: opacity .3s; }
  #stats .val { color: #fff; font-weight: 600 }
  #stats .unit { color: #8a8a96; margin-left: 2px }
  #stats .fps { color: #74e857 }
  /* Wiedergabedauer unten links: Glas-Chip mit pulsierendem Live-Punkt. Blendet
     wie die Steuerleiste bei Inaktivitaet aus - dezent, nie dauerhaft im Bild. */
  #dur { position: fixed; left: max(16px, env(safe-area-inset-left)); bottom: max(14px, env(safe-area-inset-bottom));
    display: none; align-items: center; gap: 9px; padding: 9px 15px; border-radius: 999px;
    background: rgba(10,12,18,.62); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.14); box-shadow: 0 4px 18px rgba(0,0,0,.35);
    font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: .6px;
    color: #f0f0f2; transition: opacity .3s; z-index: 5; pointer-events: none; }
  #dur .rec { width: 8px; height: 8px; border-radius: 50%; background: #f05a5a; animation: pulse 1.6s infinite; }
  .idle #dur { opacity: 0; }
  /* Untere Steuerleiste – blendet nach Inaktivitaet aus, respektiert Safe-Area */
  #bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap;
    padding: 14px max(16px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    background: linear-gradient(transparent, rgba(0,0,0,.55)); transition: opacity .3s; }
  /* Steuerleiste UND Info-Anzeige blenden bei Inaktivitaet aus – AUSSER die
     Info-Anzeige ist per 📊 angeheftet (stats-pinned), dann bleibt sie dauerhaft. */
  .idle #bar, .idle #stats { opacity: 0; pointer-events: none; }
  body.stats-pinned.idle #stats { opacity: 1; pointer-events: auto; }
  .idle { cursor: none; }
  button.ctl { display: flex; align-items: center; gap: 7px; background: rgba(20,22,30,.8); color: #e8e8ea;
    border: 1px solid rgba(255,255,255,.12); border-radius: 9px; padding: 10px 15px; font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
  button.ctl:hover { background: rgba(40,44,58,.9) }
  button.ctl:active { background: rgba(52,56,72,.95) }
  button.ctl svg { width: 17px; height: 17px; fill: currentColor }
  /* Lautstaerke in der Leiste: Lautsprecher-Icon (Mute-Toggle) + Schieberegler.
     Solange stumm, ist der Slider ausgeblendet (nutzlos) – die Aufforderung zum
     Ton uebernimmt der grosse #soundHint mitten im Bild (unuebersehbar). */
  #volCtl { align-items: center; gap: 10px; padding: 8px 14px; }
  #volCtl button { background: none; border: none; color: inherit; cursor: pointer; font-size: 16px; padding: 0; line-height: 1; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
  #volCtl.muted #volSlider { display: none; }               /* stumm: kein Slider */
  #volSlider { width: 92px; height: 4px; accent-color: #fff; cursor: pointer; }
  @media (max-width: 640px), (pointer: coarse) { #volSlider { width: 116px; height: 6px; } #volCtl button { font-size: 19px; } }
  /* Grosse Ton-Aufforderung: erscheint, sobald der Stream laeuft aber (Autoplay)
     stumm ist. Mittig ueber dem Video, pulsierend, ein Tipp aktiviert den Ton. */
  #soundHint { position: fixed; left: 50%; bottom: 23%; transform: translateX(-50%);
    display: none; align-items: center; gap: 12px; cursor: pointer; z-index: 6; white-space: nowrap;
    background: rgba(18,20,28,.9); color: #fff; border: 1px solid rgba(255,255,255,.26);
    border-radius: 999px; padding: 15px 26px; font-size: 17px; font-weight: 600;
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); box-shadow: 0 10px 34px rgba(0,0,0,.55);
    animation: soundPulse 1.9s ease-in-out infinite; -webkit-tap-highlight-color: transparent; }
  #soundHint.show { display: flex; }
  #soundHint .ico { font-size: 22px; }
  @keyframes soundPulse {
    0%,100% { transform: translateX(-50%) scale(1);    box-shadow: 0 10px 34px rgba(0,0,0,.55); border-color: rgba(255,255,255,.26); }
    50%     { transform: translateX(-50%) scale(1.045); box-shadow: 0 10px 40px rgba(74,222,128,.4); border-color: rgba(74,222,128,.6); }
  }
  @media (max-width: 640px), (pointer: coarse) { #soundHint { font-size: 18px; padding: 16px 28px; } }
  /* Schmale Bildschirme (Handy hochkant): Vollbild-Text weg -> nur Icon, damit die
     Leiste in EINE Reihe passt und nichts abgeschnitten wird oder umbricht. */
  @media (max-width: 560px) { #fsLabel { display: none; } }
  #v { will-change: transform; }
  /* Touch-Geraete / kleine Bildschirme: groessere Tap-Ziele + lesbarere Groessen */
  @media (max-width: 640px), (pointer: coarse) {
    button.ctl { padding: 12px 18px; font-size: 15px; min-height: 46px; border-radius: 11px; }
    button.ctl svg { width: 19px; height: 19px; }
    #stats { font-size: 12px; gap: 9px; padding: 6px 11px; }
    .badge { font-size: 14px; padding: 13px 18px; }
    #bar { gap: 8px; padding-top: 22px; }
  }
  /* Handy quer (sehr flach): Statuszeile kompakter halten */
  @media (max-height: 430px) {
    #stats { font-size: 11px; padding: 5px 9px; gap: 7px; }
  }
</style>
</head>
<body>
<video id="v" autoplay playsinline></video>
<canvas id="freeze" style="display:none; position:fixed; inset:0; width:100%; height:100%; object-fit:contain; background:#000; pointer-events:none; z-index:2;"></canvas>
<div id="stats">
  <span><span class="val fps" id="sFps">–</span><span class="unit">fps</span></span>
  <span><span class="val" id="sRes">–</span></span>
  <span><span class="val" id="sBitrate">–</span><span class="unit">Mbit/s</span></span>
</div>
<div id="overlay"><div class="badge"><span class="dot" id="dot"></span><span id="msg">Verbinde…</span></div></div>
<style>
  #gate { display:none; position:fixed; inset:0; z-index:9; align-items:center; justify-content:center;
    background:radial-gradient(120% 120% at 50% 30%, rgba(10,12,18,0.86), rgba(6,7,11,0.95)); backdrop-filter:blur(3px); }
  .gate-card { width:min(340px,86vw); padding:26px 26px 24px; text-align:center; border-radius:18px;
    background:linear-gradient(165deg, rgba(26,29,38,0.98), rgba(16,18,24,0.98));
    border:1px solid rgba(79,142,247,0.5); box-shadow:0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    font-family:'Segoe UI',system-ui,sans-serif; color:#eaeef4; }
  .gate-ico { font-size:34px; line-height:1; margin-bottom:12px; }
  .gate-title { font-size:19px; font-weight:700; color:#fff; }
  .gate-text { margin-top:8px; font-size:13.5px; line-height:1.5; color:#a8b3c4; }
  #gateForm { display:none; margin-top:18px; gap:9px; flex-direction:column; }
  #gateName { padding:11px 13px; border-radius:10px; border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.05); color:#fff; font-size:15px; text-align:center; outline:none; }
  #gateName:focus { border-color:#4F8EF7; }
  #gateBtn { padding:11px 0; border-radius:10px; border:0; background:#4F8EF7; color:#fff; font-size:14.5px;
    font-weight:600; cursor:pointer; box-shadow:0 4px 16px rgba(79,142,247,0.35); }
  #gateBtn:hover { filter:brightness(1.1); }
  #gateWait { display:none; margin-top:18px; align-items:center; justify-content:center; gap:10px; font-size:14px; color:#bcd0f0; }
  #gateRetry { display:none; margin-top:18px; justify-content:center; }
  #gateRetryBtn { padding:10px 20px; border-radius:10px; border:1px solid rgba(79,142,247,0.5); background:rgba(79,142,247,0.14); color:#cfe0ff; font-size:14px; font-weight:600; cursor:pointer; }
  #gateRetryBtn:hover { background:rgba(79,142,247,0.24); }
  .gate-spin { width:16px; height:16px; border-radius:50%; border:2.5px solid rgba(79,142,247,0.25);
    border-top-color:#4F8EF7; animation:gspin .8s linear infinite; }
  @keyframes gspin { to { transform:rotate(360deg); } }
</style>
<div id="gate">
  <div class="gate-card">
    <div class="gate-ico" id="gateIco">🔒</div>
    <div class="gate-title" id="gateTitle">Zutritt anfragen</div>
    <div class="gate-text" id="gateText">Der Host muss dich für diesen Stream freigeben.</div>
    <div id="gateForm">
      <input id="gateName" type="text" maxlength="24" placeholder="Dein Name" autocomplete="off">
      <button id="gateBtn" onclick="submitName()">Anfragen</button>
    </div>
    <div id="gateWait"><span class="gate-spin"></span><span id="gateWaitTxt">Warte auf Freigabe…</span></div>
    <div id="gateRetry"><button id="gateRetryBtn" onclick="retryRequest()">Erneut anfragen</button></div>
  </div>
</div>
<div id="soundHint" onclick="enableSound()"><span class="ico">🔊</span><span>Tippen für Ton</span></div>
<div id="dur"><span class="rec"></span><span id="durVal">0:00</span></div>
<div id="bar">
  <div class="ctl" id="volCtl">
    <button id="soundBtn" onclick="toggleMute()" title="Ton an/aus"><span id="volIcon">🔊</span></button>
    <input type="range" id="volSlider" min="0" max="100" value="100" oninput="onVolInput()" title="Lautstärke">
  </div>
  <button class="ctl" id="statsBtn" onclick="toggleStats()" title="Infoanzeige ein/aus">📊</button>
  <button class="ctl" id="fsBtn" onclick="toggleFullscreen()" title="Vollbild (F / Doppelklick)">
    <svg viewBox="0 0 24 24" id="fsIcon"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/></svg>
    <span id="fsLabel">Vollbild</span>
  </button>
</div>
<script>
  // Lumora-Stream-Player: WHEP-Client. Der Stream kommt aus der nativen
  // Pipeline (FFmpeg-Hardware-Encoder -> mediamtx). Der Player holt per WHEP
  // (ein POST mit dem SDP-Offer, Antwort = SDP-Answer) eine WebRTC-Verbindung
  // zu mediamtx (ueber den Lumora-Proxy auf demselben Port). Qualitaet/Helligkeit
  // bestimmt der Sender (FFmpeg) – ein Stream fuer alle Zuschauer.
  //
  // ZWEI BETRIEBSARTEN (eine Datei, damit nichts doppelt gepflegt wird):
  // 1) Direkt (window.RELAY fehlt): Auslieferung vom Streamer-PC (Port 8787),
  //    alle Pfade relativ (/cfg, /whep, ...) - exakt das bisherige Verhalten.
  // 2) Relay (gruppe.php?p=<CODE> injiziert window.RELAY): Auslieferung von der
  //    Domain, die Signalisierung (cfg/whep/qos) laeuft ueber den Vermittlungs-
  //    server - so steht NIE eine IP in der Adresszeile des Zuschauers. Das
  //    VIDEO bleibt in beiden Faellen direkt P2P (WebRTC). Kein SSE-Freeze im
  //    Relay-Modus (PHP kann kein dauerhaftes SSE; gleiche Semantik wie der
  //    Grid-Player: die WebRTC-Session uebersteht Qualitaetswechsel serverseitig).
  var RELAY = window.RELAY || null
  function relayUrl(action) {
    return RELAY.api + '&a=' + action + (RELAY.id ? '&id=' + encodeURIComponent(RELAY.id) : '')
  }
  // --- Zugriffsschutz (Tuersteher): Zuschauer-Identitaet + Freigabe-UI ----------
  // vid = dauerhafte, zufaellige Kennung je Browser (localStorage); Name gemerkt.
  // Beide reisen bei /whep mit -> der Streamer sieht den Namen und laesst pro Person zu.
  var VID = (function () {
    var v = ''; try { v = localStorage.getItem('lumora_vid') || '' } catch (e) {}
    if (!v) { v = (Date.now().toString(36) + Math.random().toString(36).slice(2, 12)).replace(/[^a-z0-9]/g, ''); try { localStorage.setItem('lumora_vid', v) } catch (e) {} }
    return v
  })()
  var GATE_DE = (navigator.language || 'de').slice(0, 2) !== 'en'
  function viewerName() { try { return (localStorage.getItem('lumora_name') || '').trim() } catch (e) { return '' } }
  function whepAuthQs() { return '&vid=' + encodeURIComponent(VID) + '&name=' + encodeURIComponent(viewerName()) }
  function hideGate() { document.getElementById('gate').style.display = 'none' }
  function showGate(mode) {
    document.getElementById('gate').style.display = 'flex'
    var form = document.getElementById('gateForm'), wait = document.getElementById('gateWait'), retry = document.getElementById('gateRetry')
    var ico = document.getElementById('gateIco'), title = document.getElementById('gateTitle'), text = document.getElementById('gateText')
    form.style.display = 'none'; wait.style.display = 'none'; retry.style.display = 'none'
    if (mode === 'banned') {   // dauerhaft gesperrt -> kein Weg (der Host hebt das aktiv auf)
      ico.textContent = '🚫'
      title.textContent = GATE_DE ? 'Kein Zutritt' : 'No access'
      text.textContent = GATE_DE ? 'Der Host hat dich für diesen Stream gesperrt.' : 'The host has blocked you from this stream.'
      return
    }
    if (mode === 'denied') {   // abgelehnt, aber KEINE Sackgasse: nach kurzem Cooldown erneut moeglich
      ico.textContent = '⏳'
      title.textContent = GATE_DE ? 'Gerade nicht freigegeben' : 'Not approved right now'
      text.textContent = GATE_DE ? 'Du kannst es in einem Moment erneut versuchen.' : 'You can try again in a moment.'
      retry.style.display = 'flex'
      document.getElementById('gateRetryBtn').textContent = GATE_DE ? 'Erneut anfragen' : 'Request again'
      return
    }
    ico.textContent = '🔒'
    title.textContent = GATE_DE ? 'Zutritt anfragen' : 'Request access'
    if (viewerName()) {   // Name bekannt -> Anfrage laeuft, auf Freigabe warten
      wait.style.display = 'flex'
      text.textContent = GATE_DE ? 'Der Host muss dich freigeben.' : 'The host needs to approve you.'
      document.getElementById('gateWaitTxt').textContent = GATE_DE ? 'Warte auf Freigabe…' : 'Waiting for approval…'
    } else {   // noch kein Name -> ERST Namensabfrage (der Host bekommt noch KEIN Popup)
      form.style.display = 'flex'
      text.textContent = GATE_DE ? 'Der Host muss dich für diesen Stream freigeben.' : 'The host must approve you for this stream.'
      document.getElementById('gateBtn').textContent = GATE_DE ? 'Anfragen' : 'Request'
      document.getElementById('gateName').placeholder = GATE_DE ? 'Dein Name' : 'Your name'
    }
  }
  function submitName() {
    var n = (document.getElementById('gateName').value || '').trim().slice(0, 24)
    if (!n) return
    try { localStorage.setItem('lumora_name', n) } catch (e) {}
    showGate('pending'); connect()   // erst JETZT (mit Namen) anfragen -> beim Host erscheint jetzt das Popup
  }
  window.submitName = submitName
  function retryRequest() { showGate('pending'); connect() }   // nach dem 60-s-Cooldown ein frischer Versuch
  window.retryRequest = retryRequest
  try { document.getElementById('gateName').addEventListener('keydown', function (e) { if (e.key === 'Enter') submitName() }) } catch (e) {}
  // Streamendes Mitglied im Schattenraum frisch aufloesen (App-Neustart vergibt
  // eine NEUE Member-ID; die beim Seitenaufbau injizierte waere dann veraltet).
  async function relayResolveId() {
    var j = await fetch(RELAY.api + '&a=list', { cache: 'no-store' }).then(function (r) { return r.json() })
    if (!j || !j.ok) throw new Error(j && j.error === 'no-room' ? 'no-room' : 'list-failed')
    var m = (j.members || []).filter(function (x) { return x.streaming !== false })[0] || (j.members || [])[0]
    if (!m) throw new Error('no-member')
    RELAY.id = m.id
  }
  var v = document.getElementById('v'), overlay = document.getElementById('overlay')
  var dot = document.getElementById('dot'), msg = document.getElementById('msg')
  var sFps = document.getElementById('sFps'), sRes = document.getElementById('sRes'), sBitrate = document.getElementById('sBitrate')
  // STUN hilft dem Zuschauer, seine eigene Adresse zu finden; die Medien laufen
  // zu mediamtx' oeffentlichem ICE-Host. TURN ist fuer reines Empfangen unnoetig.
  var ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.cloudflare.com:3478' }]
  function status(text, cls) { msg.textContent = text; dot.className = 'dot' + (cls ? ' ' + cls : '') }
  var volSlider = document.getElementById('volSlider'), volCtl = document.getElementById('volCtl'), volIcon = document.getElementById('volIcon'), soundHint = document.getElementById('soundHint')
  var _connected = false
  function applyVol() {
    var vol = volSlider.value / 100
    v.volume = vol
    // Stumm (Autoplay-Sperre) -> Slider in der Leiste ausgeblendet, dafuer die
    // grosse Aufforderung #soundHint. Aktiv -> Icon spiegelt die Lautstaerke.
    volCtl.classList.toggle('muted', v.muted)
    volIcon.textContent = v.muted ? '🔊' : (vol === 0 ? '🔇' : (vol < 0.5 ? '🔉' : '🔊'))
    soundHint.classList.toggle('show', _connected && v.muted)
  }
  function enableSound() {   // Tipp auf die grosse Aufforderung mitten im Bild
    v.muted = false
    if (Number(volSlider.value) === 0) volSlider.value = 100
    v.play().catch(function () {})
    applyVol()
  }
  function onVolInput() {
    if (volSlider.value > 0 && v.muted) v.muted = false   // erste Interaktion hebt die Autoplay-Stummschaltung auf
    v.play().catch(function () {})
    applyVol()
  }
  function toggleMute() {
    v.muted = !v.muted
    if (!v.muted) { if (Number(volSlider.value) === 0) volSlider.value = 100; v.play().catch(function () {}) }
    applyVol()
  }

  // --- Jitter-Puffer --------------------------------------------------------
  // Der STREAMER stellt den Puffer in Lumora ein; der Player holt ihn per /cfg
  // (in ms) und setzt ihn auf den Video-Empfaenger. WebRTCs Buffer ist adaptiv –
  // wir geben nur das ZIEL vor: klein = wenig Verzoegerung, gross = fluessiger
  // bei zappelnder Leitung. Regelmaessig neu geholt, damit eine Regler-Aenderung
  // auch bereits verbundene Zuschauer live erreicht (ohne Neuladen).
  var _bufMs = 120
  function applyBuffer(receiver) {
    try { receiver.playoutDelayHint = _bufMs / 1000 } catch (err) {}
    try { receiver.jitterBufferTarget = _bufMs } catch (err) {}
  }
  function refreshBuffer() {
    if (RELAY && !RELAY.id) return   // Mitglied noch nicht aufgeloest (macht connect())
    fetch(RELAY ? relayUrl('cfg') : '/cfg', { cache: 'no-store' }).then(function (r) { return r.json() }).then(function (c) {
      if (!c || typeof c.buffer !== 'number' || c.buffer === _bufMs) return
      _bufMs = c.buffer
      if (window._pc) window._pc.getReceivers().forEach(function (rc) {
        if (rc.track && rc.track.kind === 'video') applyBuffer(rc)
      })
    }).catch(function () {})
  }
  refreshBuffer()                 // initialen Wert holen (vor dem ersten Track)
  setInterval(refreshBuffer, 4000)

  // --- Nahtloser Uebergang bei Bitrate-/Aufloesungswechsel ------------------
  // Beim Fast-Restart (Bitrate) bzw. Vollneustart (Aufloesung/Encoder) blitzt in
  // der Luecke kurz mediamtx' Standard-Platzhalter ("STREAM IS OFFLINE") ueber
  // dieselbe, durchgehend offene WebRTC-Verbindung auf (s. alwaysAvailable in
  // main.js) - der Player bekommt dafuer KEIN eigenes Verbindungs-/Track-Event,
  // es sind einfach andere Frames auf demselben Track. Eine client-seitige
  // Erkennung des Platzhalters ueber Aufloesung/FPS ist NICHT zuverlaessig: real
  // gemessen laeuft er mit 1920x1080@30fps - exakt einer der haeufigsten Lumora-
  // Einstellungen (im Log dieses Users 146x gesehen; Kollision belegt). Darum
  // schickt der Streamer per SSE (/switch-events) ein PUSH-Signal GENAU beim Start
  // des Wechsels; wir legen einen Snapshot des letzten echten Bildes ueber das
  // Video und nehmen ihn nach einer festen Frist wieder weg.
  //
  // WICHTIG (Lehre aus 2026-07-15, mehrere Fehlversuche): der KRITISCHE Punkt ist
  // NICHT die Auftau-Logik, sondern dass das SSE-Signal ueberhaupt ANKOMMT. Ueber
  // Mobilfunk/NAT riss die SSE-Verbindung nach ~5 min Leerlauf ab (Log: sse-drop)
  // -> Signal weg -> Platzhalter voll sichtbar. Behoben durch SSE-Heartbeat
  // (main.js). Frame-genaue Auftau-Erkennung per requestVideoFrameCallback wurde
  // VERWORFEN: bei variabler Fenster-Breite (1920/1800/1608/1926 x1080) + der
  // 1920x1080-Kollision unzuverlaessig (2,5s-Fehl-Timeouts) und visibility:hidden
  // auf dem Live-<video> stand im Verdacht, den Stream zu stoeren. Zurueck zum
  // einfachen, bewaehrten festen Timer.
  var freeze = document.getElementById('freeze'), freezeCtx = freeze.getContext('2d')
  var _freezeTimer = null

  // Relay-Modus: Abmelden laeuft ueber a=unwhep (gruppe.php prueft die Session-URL
  // gegen das Roster und reicht das DELETE durch - kein offenes Relay).
  function relayUnwhep(session) {
    var url = RELAY.api + '&a=unwhep', payload = JSON.stringify({ session: session })
    // sendBeacon zuerst: der Browser garantiert den Versand SELBST beim Schliessen
    // (fetch keepalive wird auf Mobilbrowsern beim Tab-Schliessen oft verworfen ->
    // die Session blieb als "Zombie"-Zuschauer haengen, bis mediamtx sie per ICE-
    // Timeout aufraeumte). Fallback fetch, falls sendBeacon nicht verfuegbar/abgelehnt.
    try { if (navigator.sendBeacon && navigator.sendBeacon(url, new Blob([payload], { type: 'application/json' }))) return } catch (e) {}
    try { fetch(url, { method: 'POST', keepalive: true, body: payload }).catch(function () {}) } catch (e) {}
  }
  function leave() {
    if (window._whepSession) {
      if (RELAY) relayUnwhep(window._whepSession)
      else try { fetch(window._whepSession, { method: 'DELETE', keepalive: true }) } catch (e) {}
      window._whepSession = null
    }
  }
  // WICHTIG (mobil): Ein App-Wechsel oder eine eingehende Benachrichtigung
  // (WhatsApp o.ae.) legt die Seite nur kurz in den Hintergrund – pagehide feuert
  // dann, OHNE dass der Zuschauer den Player wirklich verlaesst. Wir duerfen die
  // WHEP-Session hier NICHT abbauen, sonst ist der Stream nach dem Zurueckschalten
  // tot. Nur beim ECHTEN Verwerfen der Seite (persisted=false) abmelden; beim
  // Weg-Tabben (bfcache, persisted=true) bleibt die Verbindung bestehen.
  window.addEventListener('pagehide', function (e) { if (!e.persisted) leave() })
  window.addEventListener('beforeunload', leave)
  // Rueckkehr aus dem Hintergrund: mobile Browser pausieren das Video -> wieder
  // anwerfen; und falls die Verbindung (auch nach 2-5 Min) abgerissen ist, neu
  // verbinden. WICHTIG: Nach langem Hintergrund kappt der Browser die Verbindung
  // teils STILL – connectionState bleibt 'connected', aber es kommt kein Bild mehr.
  // Darum messen wir die tatsaechlich dekodierten Frames statt dem Status zu trauen.
  var _healthTimer = null
  function framesDecoded() {
    return new Promise(function (res) {
      if (!window._pc) return res(null)
      window._pc.getStats().then(function (s) {
        var n = null; s.forEach(function (r) { if (r.type === 'inbound-rtp' && r.kind === 'video') n = r.framesDecoded })
        res(n)
      }).catch(function () { res(null) })
    })
  }
  function resume() {
    v.play().catch(function () {})
    var st = window._pc && window._pc.connectionState
    if (!window._pc || st === 'failed' || st === 'disconnected' || st === 'closed') { retry(); return }
    // Status meldet "gesund" – trotzdem gegenpruefen, ob wirklich wieder Bild kommt.
    framesDecoded().then(function (before) {
      clearTimeout(_healthTimer)
      _healthTimer = setTimeout(function () {
        if (document.visibilityState !== 'visible') return
        framesDecoded().then(function (after) {
          if (before == null || after == null || after <= before) retry()   // kein neuer Frame in ~2s -> neu verbinden
        })
      }, 2000)
    })
  }
  document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'visible') resume() })
  window.addEventListener('pageshow', function (e) { if (e.persisted) resume() })   // Rueckkehr aus dem bfcache

  // --- Watchdog: heilt ALLE Lebenslagen, unabhaengig von den Ereignis-Ketten ---
  // Alle 4 s pruefen: Verbindung fehlt/failed/closed -> neu verbinden; Aufbau
  // haengt >15 s -> neu; Status sagt "connected", aber >12 s kein neues Bild
  // (stiller Tod, z. B. Sender-Absturz) -> neu. Damit erholt sich der Player
  // selbst dann, wenn ein Einzelpfad (Event verpasst, Retry-Kette gerissen,
  // Hintergrund-Timing) versagt hat.
  var _wdFrames = -1, _wdStall = 0
  window._wdStarted = Date.now()
  setInterval(function () {
    if (document.visibilityState !== 'visible' || retrying) return
    var pc = window._pc
    if (!pc) { retry(); return }
    var st = pc.connectionState
    if (st === 'failed' || st === 'closed') { retry(); return }
    if (st === 'new' || st === 'connecting') {
      if (Date.now() - (window._wdStarted || 0) > 15000) retry()
      return
    }
    if (v.paused) v.play().catch(function () {})
    framesDecoded().then(function (n) {
      if (n == null || window._pc !== pc) return
      if (n === _wdFrames) {
        _wdStall++
        if (_wdStall >= 3) { _wdStall = 0; retry() }
      } else { _wdStall = 0; _wdFrames = n }
    })
  }, 4000)

  connect()
</script>
</body>
</html>
